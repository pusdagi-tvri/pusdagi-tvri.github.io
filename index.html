<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Survei Lapangan</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600&family=Syne:wght@500;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f4f5f0; color: #1a1a1a; }
.app { max-width: 480px; margin: 0 auto; background: white; min-height: 100vh; }

.header { background: #0f3d2b; color: #e8f5e3; padding: 1.25rem 1.5rem 1rem; position: sticky; top: 0; z-index: 10; }
.header-title { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; }
.header-sub { font-size: 12px; opacity: 0.65; margin-top: 2px; }
.progress-bar { height: 3px; background: rgba(255,255,255,0.15); margin-top: 10px; border-radius: 99px; overflow: hidden; }
.progress-fill { height: 100%; background: #4cdf8e; border-radius: 99px; transition: width 0.4s ease; }

.steps-nav { display: flex; gap: 6px; padding: 1rem 1.5rem 0.5rem; overflow-x: auto; scrollbar-width: none; }
.steps-nav::-webkit-scrollbar { display: none; }
.step-chip { font-size: 11px; font-weight: 500; padding: 5px 12px; border-radius: 99px; border: 0.5px solid #ccc; background: #f4f5f0; color: #666; white-space: nowrap; cursor: pointer; transition: all 0.2s; }
.step-chip.active { background: #0f3d2b; color: #e8f5e3; border-color: #0f3d2b; }
.step-chip.done { background: #eaf3de; color: #3B6D11; border-color: #97C459; }

.section { display: none; padding: 1.25rem 1.5rem; animation: fadeIn 0.25s ease; }
.section.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

.section-label { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #0f3d2b; margin-bottom: 1rem; padding-bottom: 8px; border-bottom: 2px solid #4cdf8e; display: inline-block; }

.field { margin-bottom: 1.1rem; }
.field label { display: block; font-size: 12px; font-weight: 600; color: #555; letter-spacing: 0.04em; text-transform: uppercase; margin-bottom: 6px; }
.field input, .field select, .field textarea { width: 100%; font-family: 'Plus Jakarta Sans', sans-serif; font-size: 14px; padding: 10px 12px; border: 0.5px solid #ccc; border-radius: 8px; background: #f9f9f7; color: #1a1a1a; outline: none; transition: border-color 0.2s; }
.field input:focus, .field select:focus, .field textarea:focus { border-color: #0f3d2b; box-shadow: 0 0 0 2px rgba(15,61,43,0.1); }
.field textarea { resize: vertical; min-height: 80px; }

.radio-group { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 6px; }
.radio-opt { display: flex; align-items: center; gap: 6px; padding: 7px 14px; border: 0.5px solid #ccc; border-radius: 99px; cursor: pointer; font-size: 13px; color: #555; transition: all 0.2s; user-select: none; }
.radio-opt input { display: none; }
.radio-opt.selected { background: #0f3d2b; color: #e8f5e3; border-color: #0f3d2b; }

.check-group { display: flex; flex-direction: column; gap: 6px; margin-top: 6px; }
.check-opt { display: flex; align-items: center; gap: 10px; padding: 9px 14px; border: 0.5px solid #ccc; border-radius: 8px; cursor: pointer; font-size: 13px; color: #1a1a1a; transition: all 0.2s; user-select: none; }
.check-opt input { display: none; }
.check-box { width: 16px; height: 16px; border-radius: 4px; border: 1.5px solid #ccc; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
.check-opt.selected .check-box { background: #0f3d2b; border-color: #0f3d2b; }
.check-opt.selected .check-box::after { content: ''; display: block; width: 8px; height: 5px; border-left: 2px solid #fff; border-bottom: 2px solid #fff; transform: rotate(-45deg) translate(1px,-1px); }

.scale-row { display: flex; gap: 6px; margin-top: 8px; }
.scale-btn { flex: 1; padding: 10px 0; border: 0.5px solid #ccc; border-radius: 8px; background: #f9f9f7; font-size: 13px; font-weight: 500; color: #555; cursor: pointer; transition: all 0.2s; }
.scale-btn.selected { background: #0f3d2b; color: #fff; border-color: #0f3d2b; }
.scale-labels { display: flex; justify-content: space-between; font-size: 10px; color: #888; margin-top: 4px; }

.gps-card { border: 0.5px solid #ccc; border-radius: 12px; padding: 1rem; background: #f9f9f7; margin-bottom: 1rem; }
.gps-status { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #555; margin-bottom: 10px; }
.gps-dot { width: 8px; height: 8px; border-radius: 50%; background: #aaa; flex-shrink: 0; transition: background 0.3s; }
.gps-dot.active { background: #4cdf8e; box-shadow: 0 0 0 3px rgba(76,223,142,0.2); }
.gps-dot.error { background: #E24B4A; }
.gps-dot.warning { background: #EF9F27; }
.coords-display { font-size: 13px; line-height: 1.6; display: none; }
.coords-display.show { display: block; }
.coord-row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 0.5px solid #e5e5e5; }
.coord-label { color: #888; font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; }
.coord-val { font-weight: 500; font-size: 13px; }
.zone-badge { display: inline-flex; align-items: center; gap: 5px; padding: 5px 10px; border-radius: 99px; font-size: 11px; font-weight: 600; margin-top: 8px; }
.zone-badge.valid { background: #eaf3de; color: #3B6D11; }
.zone-badge.invalid { background: #FCEBEB; color: #A32D2D; }

.btn-primary { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 11px; background: #0f3d2b; color: #e8f5e3; border: none; border-radius: 10px; font-family: 'Plus Jakarta Sans', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
.btn-primary:active { transform: scale(0.98); }
.btn-primary:disabled { opacity: 0.45; cursor: not-allowed; }
.btn-outline { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 10px; background: transparent; color: #0f3d2b; border: 1px solid #0f3d2b; border-radius: 10px; font-family: 'Plus Jakarta Sans', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; margin-bottom: 8px; }

.camera-preview { width: 100%; border-radius: 12px; overflow: hidden; background: #000; aspect-ratio: 4/3; position: relative; margin-bottom: 8px; display: none; }
.camera-preview.show { display: block; }
.camera-preview video { width: 100%; height: 100%; object-fit: cover; }
.camera-overlay { position: absolute; bottom: 12px; left: 0; right: 0; display: flex; justify-content: center; }
.shutter-btn { width: 54px; height: 54px; border-radius: 50%; background: white; border: 3px solid #0f3d2b; cursor: pointer; font-size: 22px; display: flex; align-items: center; justify-content: center; }
.close-cam { width: 32px; height: 32px; border-radius: 50%; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.3); color: white; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; position: absolute; top: 10px; right: 10px; }

.photo-zone { border: 1.5px dashed #bbb; border-radius: 12px; padding: 1.5rem; text-align: center; cursor: pointer; background: #f9f9f7; position: relative; overflow: hidden; margin-bottom: 1rem; }
.photo-zone input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
.photo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 1rem; }
.photo-thumb { aspect-ratio: 1; border-radius: 8px; overflow: hidden; border: 0.5px solid #ccc; position: relative; background: #f0f0f0; }
.photo-thumb img { width: 100%; height: 100%; object-fit: cover; }
.photo-thumb .del-btn { position: absolute; top: 4px; right: 4px; width: 18px; height: 18px; background: rgba(15,61,43,0.8); color: white; border: none; border-radius: 50%; font-size: 10px; line-height: 18px; text-align: center; cursor: pointer; }
.photo-thumb .photo-label { position: absolute; bottom: 0; left: 0; right: 0; font-size: 9px; background: rgba(15,61,43,0.7); color: white; padding: 2px 4px; text-align: center; }

.nav-row { display: flex; gap: 10px; padding: 1rem 1.5rem 0.5rem; border-top: 0.5px solid #eee; margin-top: 0.5rem; }
.btn-prev { padding: 10px 20px; border: 0.5px solid #ccc; border-radius: 10px; background: transparent; font-family: 'Plus Jakarta Sans', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; color: #666; }
.btn-next { flex: 1; padding: 10px; background: #0f3d2b; color: #e8f5e3; border: none; border-radius: 10px; font-family: 'Plus Jakarta Sans', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; }

.review-block { border: 0.5px solid #ccc; border-radius: 10px; overflow: hidden; margin-bottom: 1rem; }
.review-row { display: flex; padding: 9px 14px; border-bottom: 0.5px solid #f0f0f0; font-size: 13px; }
.review-row:last-child { border-bottom: none; }
.review-key { color: #888; width: 45%; flex-shrink: 0; font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; }
.review-val { color: #1a1a1a; font-weight: 500; flex: 1; }

.submit-done { text-align: center; padding: 2rem 1.5rem; display: none; }
.submit-done.show { display: block; }
.done-icon { font-size: 48px; margin-bottom: 12px; }
.done-title { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 700; color: #0f3d2b; margin-bottom: 6px; }
.done-sub { font-size: 13px; color: #666; line-height: 1.6; }
.ref-code { display: inline-block; margin-top: 10px; padding: 6px 16px; background: #eaf3de; color: #0f3d2b; border-radius: 99px; font-size: 12px; font-weight: 600; letter-spacing: 0.06em; }

.error-banner { background: #FCEBEB; color: #A32D2D; border-radius: 8px; padding: 10px 14px; font-size: 12px; margin-bottom: 1rem; display: none; }
.error-banner.show { display: block; }

.required-star { color: #E24B4A; }
.info-note { font-size: 11px; color: #888; margin-top: 4px; line-height: 1.5; }
.spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-title">Pusdagi LPP TVRI</div>
    <div class="header-sub">Program Monitoring &amp; Evaluasi Wilayah</div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:20%"></div></div>
  </div>
</div>

<script>
  // ============================================================
  // GANTI INI dengan URL Vercel Anda setelah deploy
  // Contoh: 'https://survei-backend.vercel.app'
  // ============================================================
  const API_BASE = 'https://YOUR-PROJECT.vercel.app';

  let currentStep = 0;
  const totalSteps = 5;
  let gpsData = null;
  let photos = [];
  let scaleValues = {};
  let radioValues = {};
  let checkValues = {};
  let cameraStream = null;
  const TARGET_LAT = -6.1955;
  const TARGET_LNG = 106.8319;
  const RADIUS_KM = 5;

  function goTo(step) {
    document.getElementById('sec' + currentStep).classList.remove('active');
    document.getElementById('chip' + currentStep).classList.remove('active');
    if (currentStep < step) document.getElementById('chip' + currentStep).classList.add('done');
    currentStep = step;
    document.getElementById('sec' + currentStep).classList.add('active');
    document.getElementById('chip' + currentStep).classList.remove('done');
    document.getElementById('chip' + currentStep).classList.add('active');
    updateNav();
    updateProgress();
    if (step === 4) buildReview();
  }
  function nextStep() { if (currentStep < totalSteps - 1) goTo(currentStep + 1); }
  function prevStep() { if (currentStep > 0) goTo(currentStep - 1); }
  function updateNav() {
    const nav = document.getElementById('navRow');
    nav.style.display = currentStep === totalSteps - 1 ? 'none' : 'flex';
    document.getElementById('prevBtn').style.display = currentStep > 0 ? '' : 'none';
  }
  function updateProgress() {
    document.getElementById('progressFill').style.width = (((currentStep + 1) / totalSteps) * 100) + '%';
  }
  function selectScale(id, val, btn) {
    scaleValues[id] = val;
    document.querySelectorAll('#' + id + ' .scale-btn').forEach((b, i) => b.classList.toggle('selected', i < val));
  }
  function selectRadio(id, lbl) {
    radioValues[id] = lbl.querySelector('input').value;
    document.querySelectorAll('#' + id + ' .radio-opt').forEach(o => o.classList.remove('selected'));
    lbl.classList.add('selected');
  }
  function toggleCheck(lbl) {
    lbl.classList.toggle('selected');
    const inp = lbl.querySelector('input');
    inp.checked = !inp.checked;
    const id = lbl.closest('.check-group').id;
    if (!checkValues[id]) checkValues[id] = [];
    if (inp.checked) { checkValues[id].push(inp.value); }
    else { checkValues[id] = checkValues[id].filter(v => v !== inp.value); }
  }
  function haversine(lat1, lng1, lat2, lng2) {
    const R = 6371;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLng = (lng2 - lng1) * Math.PI / 180;
    const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  }
  function getGPS() {
    const btn = document.getElementById('gpsBtn');
    const dot = document.getElementById('gpsDot');
    const statusText = document.getElementById('gpsStatusText');
    btn.innerHTML = '<span class="spinner"></span> Mendapatkan lokasi...';
    btn.disabled = true;
    dot.className = 'gps-dot';
    statusText.textContent = 'Mengakses GPS perangkat...';
    if (!navigator.geolocation) { showGPSError('GPS tidak tersedia di perangkat ini'); return; }
    navigator.geolocation.getCurrentPosition(
      (pos) => {
        const lat = pos.coords.latitude;
        const lng = pos.coords.longitude;
        const acc = pos.coords.accuracy;
        const dist = haversine(lat, lng, TARGET_LAT, TARGET_LNG);
        gpsData = { lat, lng, acc, inZone: dist <= RADIUS_KM };
        document.getElementById('cLat').textContent = lat.toFixed(6) + '°';
        document.getElementById('cLng').textContent = lng.toFixed(6) + '°';
        document.getElementById('cAcc').textContent = Math.round(acc) + ' meter';
        document.getElementById('cTime').textContent = new Date().toLocaleTimeString('id-ID');
        document.getElementById('coordsDisplay').classList.add('show');
        const badge = document.getElementById('zoneBadge');
        badge.style.display = 'inline-flex';
        if (gpsData.inZone) {
          dot.className = 'gps-dot active';
          statusText.textContent = 'Koordinat berhasil diambil';
          badge.className = 'zone-badge valid';
          badge.innerHTML = '✓ Dalam wilayah survei (' + dist.toFixed(1) + ' km dari pusat)';
        } else {
          dot.className = 'gps-dot warning';
          statusText.textContent = 'Lokasi di luar cakupan wilayah';
          badge.className = 'zone-badge invalid';
          badge.innerHTML = '✗ Di luar wilayah (' + dist.toFixed(1) + ' km — maks. ' + RADIUS_KM + ' km)';
        }
        updateMapPin(lat, lng);
        btn.innerHTML = '↻ Perbarui koordinat';
        btn.disabled = false;
      },
      (err) => {
        let msg = 'Gagal mendapatkan lokasi';
        if (err.code === 1) msg = 'Izin GPS ditolak. Aktifkan di pengaturan.';
        else if (err.code === 2) msg = 'Sinyal GPS lemah. Coba di luar ruangan.';
        else if (err.code === 3) msg = 'Waktu habis. Coba lagi.';
        showGPSError(msg);
      },
      { enableHighAccuracy: true, timeout: 12000, maximumAge: 0 }
    );
  }
  function showGPSError(msg) {
    document.getElementById('gpsDot').className = 'gps-dot error';
    document.getElementById('gpsStatusText').textContent = msg;
    const btn = document.getElementById('gpsBtn');
    btn.innerHTML = 'Coba lagi';
    btn.disabled = false;
  }
  function updateMapPin(lat, lng) {
    const latRange = [TARGET_LAT - 0.07, TARGET_LAT + 0.07];
    const lngRange = [TARGET_LNG - 0.07, TARGET_LNG + 0.07];
    const cx = Math.max(44, Math.min(296, ((lng - lngRange[0]) / (lngRange[1] - lngRange[0])) * 260 + 40));
    const cy = Math.max(24, Math.min(136, 160 - (((lat - latRange[0]) / (latRange[1] - latRange[0])) * 120 + 20) + 4));
    document.getElementById('mapPin').setAttribute('cx', cx);
    document.getElementById('mapPin').setAttribute('cy', cy);
    document.getElementById('mapPinRing').setAttribute('cx', cx);
    document.getElementById('mapPinRing').setAttribute('cy', cy);
  }
  async function startCamera() {
    try {
      cameraStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false });
      document.getElementById('camVideo').srcObject = cameraStream;
      document.getElementById('cameraPreview').classList.add('show');
      document.getElementById('camBtn').style.display = 'none';
    } catch(e) { alert('Tidak dapat mengakses kamera: ' + e.message); }
  }
  function stopCamera() {
    if (cameraStream) { cameraStream.getTracks().forEach(t => t.stop()); cameraStream = null; }
    document.getElementById('cameraPreview').classList.remove('show');
    document.getElementById('camBtn').style.display = '';
  }
  function capturePhoto() {
    const video = document.getElementById('camVideo');
    const canvas = document.getElementById('snapCanvas');
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    canvas.getContext('2d').drawImage(video, 0, 0);
    addPhoto(canvas.toDataURL('image/jpeg', 0.85), 'Kamera');
    stopCamera();
  }
  function handleFileSelect(e) {
    Array.from(e.target.files).forEach(file => {
      if (photos.length >= 6) return;
      const reader = new FileReader();
      reader.onload = ev => addPhoto(ev.target.result, file.name.split('.')[0].substring(0,12));
      reader.readAsDataURL(file);
    });
    e.target.value = '';
  }
  function addPhoto(src, label) {
    if (photos.length >= 6) return;
    photos.push({ src, label });
    renderPhotos();
  }
  function renderPhotos() {
    const grid = document.getElementById('photoGrid');
    const cnt = document.getElementById('photoCount');
    grid.innerHTML = photos.map((p, i) => `
      <div class="photo-thumb">
        <img src="${p.src}" alt="foto ${i+1}" />
        <button class="del-btn" onclick="removePhoto(${i})">✕</button>
        <div class="photo-label">${p.label}</div>
      </div>`).join('');
    cnt.style.display = photos.length ? 'block' : 'none';
    cnt.textContent = photos.length + ' foto tersimpan';
    document.getElementById('photoZone').style.display = photos.length >= 6 ? 'none' : '';
  }
  function removePhoto(i) { photos.splice(i, 1); renderPhotos(); }
  function buildReview() {
    const rows = [
      ['Nama', document.getElementById('f_nama').value || '—'],
      ['NIK', document.getElementById('f_nik').value || '—'],
      ['Telepon', document.getElementById('f_telp').value || '—'],
      ['Kelurahan', document.getElementById('f_kel').value || '—'],
      ['RT/RW', (document.getElementById('f_rt').value||'—') + ' / ' + (document.getElementById('f_rw').value||'—')],
      ['Kepuasan layanan', scaleValues['q_kepuasan'] ? scaleValues['q_kepuasan'] + '/5' : '—'],
      ['Akses faskes', radioValues['q_faskes'] || '—'],
      ['Masalah lingkungan', (checkValues['q_masalah']||[]).join(', ') || '—'],
      ['Penghasilan', document.getElementById('q_penghasilan').value || '—'],
      ['GPS', gpsData ? gpsData.lat.toFixed(5) + ', ' + gpsData.lng.toFixed(5) : '—'],
      ['Status wilayah', gpsData ? (gpsData.inZone ? '✓ Dalam wilayah' : '✗ Luar wilayah') : '—'],
      ['Foto', photos.length + ' foto'],
    ];
    document.getElementById('reviewBlock').innerHTML = rows.map(([k,v]) =>
      `<div class="review-row"><div class="review-key">${k}</div><div class="review-val">${v}</div></div>`).join('');
    document.getElementById('navRow').style.display = 'none';
  }

  async function submitSurvey() {
    const btn = document.getElementById('submitBtn');
    const errorBanner = document.getElementById('errorBanner');
    errorBanner.classList.remove('show');

    btn.innerHTML = '<span class="spinner"></span> Mengirim ke server...';
    btn.disabled = true;

    const refCode = 'SRV-' + Date.now().toString(36).toUpperCase().slice(-6);

    const payload = {
      ref_code: refCode,
      nama: document.getElementById('f_nama').value,
      nik: document.getElementById('f_nik').value,
      telepon: document.getElementById('f_telp').value,
      kelurahan: document.getElementById('f_kel').value,
      rt: document.getElementById('f_rt').value,
      rw: document.getElementById('f_rw').value,
      kepuasan: scaleValues['q_kepuasan'] || null,
      faskes: radioValues['q_faskes'] || null,
      masalah: checkValues['q_masalah'] || [],
      penghasilan: document.getElementById('q_penghasilan').value,
      saran: document.getElementById('q_saran').value,
      gps: gpsData,
      foto_count: photos.length,
    };

    try {
      const res = await fetch(API_BASE + '/api/submit', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });

      const result = await res.json();

      if (!res.ok) throw new Error(result.error || 'Gagal mengirim data');

      document.getElementById('refCode').textContent = 'REF: ' + (result.ref_code || refCode);
      document.getElementById('sec4').classList.remove('active');
      document.getElementById('submitDone').classList.add('show');
      document.querySelector('.steps-nav').style.display = 'none';
      document.getElementById('progressFill').style.width = '100%';

    } catch (err) {
      errorBanner.textContent = '⚠ ' + err.message + '. Periksa koneksi internet dan coba lagi.';
      errorBanner.classList.add('show');
      btn.innerHTML = 'Kirim survei';
      btn.disabled = false;
      document.getElementById('agreeCheck').checked = false;
    }
  }
</script>
</body>
</html>
